name: Continuous Integration

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
     - name: Checkout
       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

     - name: Test and Build
       uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
       with:
         java-version: '21'
         distribution: 'temurin'
         architecture: x64
